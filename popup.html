<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="popupTitle">Text Completer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f2;
      --surface: #fffdf7;
      --surface-strong: #ffffff;
      --text: #1f2937;
      --muted: #5b6474;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --border: rgba(15, 23, 42, 0.12);
      --danger: #b91c1c;
    }

    body {
      margin: 0;
      width: 360px;
      font: 14px/1.45 "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.15), transparent 38%),
        linear-gradient(180deg, #fbfcf8 0%, var(--bg) 100%);
    }

    main {
      padding: 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      padding: 14px;
    }

    .panel + .panel {
      margin-top: 12px;
    }

    h1, h2 {
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    h1 {
      font-size: 18px;
    }

    h2 {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 74px;
      margin-top: 10px;
      padding: 10px 12px;
      font: inherit;
      color: inherit;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      font: inherit;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.16s ease, background-color 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary-btn {
      width: 100%;
      margin-top: 10px;
      padding: 10px 12px;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
    }

    .secondary-btn {
      padding: 8px 10px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.05);
    }

    .site-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }

    .site-meta {
      min-width: 0;
    }

    .site-name {
      display: block;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-status {
      font-size: 12px;
      color: var(--muted);
    }

    .helper {
      margin-top: 8px;
      font-size: 12px;
    }

    .list {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
    }

    .sentence {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.04);
    }

    .sentence span {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .delete-btn {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      color: var(--danger);
      background: rgba(185, 28, 28, 0.08);
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1 data-i18n="savedTextsTitle">Saved Texts</h1>
      <p data-i18n="popupHelperText">Use Arrow Up/Down to switch suggestions and Tab to accept.</p>
      <textarea id="sentence" rows="3" data-i18n-placeholder="sentencePlaceholder"></textarea>
      <button id="addBtn" class="primary-btn" data-i18n="addTextButton">Add Text</button>
      <div id="list" class="list"></div>
    </section>

    <section class="panel">
      <h2 data-i18n="currentSiteTitle">Current Site</h2>
      <div class="site-row">
        <div class="site-meta">
          <span id="currentSite" class="site-name"></span>
          <span id="siteStatus" class="site-status"></span>
        </div>
        <button id="toggleSiteBtn" class="secondary-btn"></button>
      </div>
      <p class="helper" data-i18n="currentSiteHelper">When no sites are listed, the extension works on all sites.</p>
    </section>

    <div class="footer">
      <button id="openSettingsBtn" class="secondary-btn" data-i18n="openSettingsButton">Open Settings</button>
    </div>
  </main>

  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
