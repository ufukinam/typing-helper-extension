<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Cümle Önerileri</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      width: 320px;
      box-sizing: border-box;
    }

    textarea {
      width: 100%;
      padding: 6px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      resize: none;
      box-sizing: border-box;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      font-size: 14px;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    #list {
      margin-top: 15px;
      max-height: 180px;
      overflow-y: auto;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    .sentence {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
      padding: 4px 0;
      word-break: break-word;
    }

    .sentence span {
      flex-grow: 1;
      margin-right: 8px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      margin: 0;
      line-height: 1;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #c00;
    }

    #siteControl {
      margin-top: 16px;
      text-align: right;
    }

    #siteControl a {
      text-decoration: none;
      font-size: 13px;
      color: #007BFF;
    }

    #siteControl a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h3>Kayıtlı Metinler</h3>
  <textarea id="sentence" rows="2" placeholder="Eklemek istediğiniz metni girin."></textarea>
  <button id="addBtn">Metin Ekle</button>
  <div id="list"></div>

  <div id="siteControl">
    <a href="settings.html" target="_blank">Ayarları Aç</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
